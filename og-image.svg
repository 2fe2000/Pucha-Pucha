  <!-- 브랜드 이모지 원형 -->
  <circle cx="820" cy="315" r="200" fill="#1e3a5f" opacity="0.5"/>
  <circle cx="820" cy="315" r="160" fill="#1e293b" opacity="0.7"/>

  <text x="820" y="180" font-size="42" text-anchor="middle" font-family="Arial">🍗</text>
  <text x="960" y="240" font-size="36" text-anchor="middle" font-family="Arial">🥐</text>
  <text x="990" y="340" font-size="36" text-anchor="middle" font-family="Arial">☕</text>
  <text x="940" y="440" font-size="36" text-anchor="middle" font-family="Arial">🍔</text>
  <text x="820" y="470" font-size="36" text-anchor="middle" font-family="Arial">🍕</text>
  <text x="690" y="440" font-size="36" text-anchor="middle" font-family="Arial">🍦</text>
  <text x="640" y="340" font-size="36" text-anchor="middle" font-family="Arial">🍩</text>
  <text x="690" y="240" font-size="36" text-anchor="middle" font-family="Arial">💄</text>
  <text x="820" y="340" font-size="52" text-anchor="middle" font-family="Arial">🗺️</text>

  <!-- URL 배지 -->
  <rect x="80" y="550" width="320" height="40" rx="8" fill="#1e293b"/>
  <text x="240" y="576" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">pucha-pucha.vercel.app</text>
