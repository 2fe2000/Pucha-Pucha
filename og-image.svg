  <rect x="80" y="100" width="56" height="56" rx="14" fill="#2563eb"/>
  <text x="108" y="138" font-size="28" text-anchor="middle" font-family="Arial">🗺️</text>

  <!-- 브랜드 제목 -->
  <text x="152" y="126" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="2">PUCHA PUCHA</text>
  <text x="152" y="148" font-family="Arial, sans-serif" font-size="13" fill="#64748b">프차프차</text>

  <!-- 메인 타이틀 -->
  <text x="94" y="260" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#fff" letter-spacing="-1">전국 프랜차이즈</text>
  <text x="94" y="330" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#fff" letter-spacing="-1">가맹점 지도</text>

