<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>프차프차 — 전국 프랜차이즈 가맹점 지도</title>

  <!-- Open Graph / KakaoTalk 썸네일 -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://pucha-pucha.vercel.app/">
  <meta property="og:title"       content="프차프차 🗺️ — 전국 프랜차이즈 가맹점 지도">
  <meta property="og:description" content="교촌·BBQ·BHC·스타벅스·파리바게뜨 등 20개 브랜드 전국 가맹점을 지도에서 한눈에! 브랜드·지역별 검색 제공.">
  <meta property="og:image"       content="https://pucha-pucha.vercel.app/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale"      content="ko_KR">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 340px;
      --header-h: 58px;
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #f9fafb;
      --card: #fff;
      --radius: 10px;
      --sheet-h: 76px; /* peek height — updated by JS on mobile */
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      padding-top: env(safe-area-inset-top, 0px);
      background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding-left: 18px; padding-right: 18px; gap: 10px;
      z-index: 1000; box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .logo-wrap { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 30px; height: 30px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-text { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .logo-text span { color: var(--primary); }
    .header-sub { font-size: 12px; color: var(--muted); padding-left: 10px; border-left: 1px solid var(--border); }
    .header-stats { margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); white-space: nowrap; }
    .header-stats b { color: var(--primary); font-weight: 700; font-size: 14px; }

    /* ── Layout ── */
    #layout {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; bottom: 0;
      display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; z-index: 100;
    }

    /* ── Drag Handle (mobile only) ── */
    #sheet-handle {
      display: none;
      justify-content: center; align-items: center;
      padding: 10px 0 6px; flex-shrink: 0; cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    #sheet-handle::before {
      content: ''; display: block;
      width: 38px; height: 4px; background: #d1d5db; border-radius: 2px;
    }

    /* ── Tab Bar ── */
    #tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      padding: 0 4px; gap: 2px; background: #fff; flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 600;
      color: var(--muted); border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Tab Panels ── */
    .tab-panel { display: none; padding: 12px 12px 0; }
    .tab-panel.active { display: block; }

    /* ── Brand Grid ── */
    #brand-panel { padding: 12px 12px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #brand-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
      max-height: 195px; overflow-y: auto; padding-bottom: 10px;
    }
    .brand-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; padding: 7px 3px; border: 1.5px solid var(--border); border-radius: 8px;
      background: #fff; cursor: pointer; transition: all .15s;
      font-size: 9.5px; color: var(--muted); font-family: inherit; line-height: 1.3;
    }
    .brand-btn .b-icon { font-size: 17px; }
    .brand-btn .b-name { font-size: 9.5px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; width: 100%; text-overflow: ellipsis; padding: 0 2px; }
    .brand-btn .b-cnt { font-size: 8.5px; background: rgba(0,0,0,.07); padding: 1px 4px; border-radius: 10px; }
    .brand-btn:hover { border-color: #94a3b8; color: var(--text); transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.08); }
    .brand-btn.active { color: #fff; border-color: transparent; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .brand-btn.active .b-cnt { background: rgba(255,255,255,.25); color: #fff; }
    .all-btn { grid-column: span 2; flex-direction: row; gap: 6px; padding: 8px 12px; justify-content: flex-start; }

    /* ── Region Grid ── */
    #region-panel { padding: 12px 12px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #region-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding-bottom: 10px; }
    .region-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; padding: 8px 4px; border: 1.5px solid var(--border); border-radius: 8px;
      background: #fff; cursor: pointer; transition: all .15s;
      font-size: 12px; font-weight: 600; color: var(--muted); font-family: inherit;
    }
    .region-btn .r-cnt { font-size: 9px; color: var(--muted); font-weight: 400; }
    .region-btn:hover { border-color: #94a3b8; color: var(--text); transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.08); }
    .region-btn.active { background: #0f172a; border-color: #0f172a; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .region-btn.active .r-cnt { color: rgba(255,255,255,.7); }
    .all-region-btn { grid-column: span 2; flex-direction: row; gap: 6px; padding: 8px 12px; justify-content: flex-start; font-size: 13px; }

    /* ── Active Filter Chips ── */
    #filter-chips { display: none; padding: 8px 12px; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #filter-chips.visible { display: flex; }
    .chip {
      display: flex; align-items: center; gap: 4px; padding: 3px 8px 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .chip:hover { opacity: .8; }
    .chip-x { font-size: 12px; opacity: .7; }

    /* ── Search ── */
    #search-panel { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #search-wrap { position: relative; }
    #search-wrap .s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search-input {
      width: 100%; padding: 8px 10px 8px 32px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: inherit; outline: none; background: var(--bg);
      transition: border-color .15s, background .15s;
    }
    #search-input:focus { border-color: var(--primary); background: #fff; }
    #search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      border: none; background: none; cursor: pointer; color: var(--muted); font-size: 14px; display: none; padding: 2px; }
    #search-clear.visible { display: block; }

    /* ── List Header ── */
    #list-header {
      padding: 8px 12px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
    }
    #list-header .lh-count { font-size: 12px; color: var(--muted); }
    #list-header .lh-count b { color: var(--text); font-weight: 700; }
    #list-header .lh-sort { font-size: 11px; color: var(--muted); }

    /* ── Store List ── */
    #store-list { flex: 1; overflow-y: auto; }
    .store-item {
      padding: 11px 12px; border-bottom: 1px solid #f3f4f6;
      cursor: pointer; transition: background .1s; display: flex; gap: 10px; align-items: flex-start;
    }
    .store-item:hover { background: #f8faff; }
    .store-item.active { background: var(--primary-light); }
    .store-badge {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .store-info { flex: 1; min-width: 0; }
    .store-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .store-brand-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 4px; margin-bottom: 3px; }
    .store-addr { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .store-phone { font-size: 10.5px; color: #94a3b8; margin-top: 2px; }

    .empty-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 13px; gap: 10px; }
    .empty-msg .big { font-size: 40px; }

    /* ── Map ── */
    #map { flex: 1; position: relative; }
    #my-location-btn {
      position: absolute; bottom: 24px; right: 14px; z-index: 500;
      width: 40px; height: 40px; border-radius: 50%; background: #fff;
      border: none; box-shadow: 0 2px 10px rgba(0,0,0,.18); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px; gap: 6px;
      transition: box-shadow .15s;
    }
    #my-location-btn:hover { box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    #my-location-btn .loc-label { display: none; }

    /* ── Popup ── */
    .store-popup { min-width: 200px; padding: 2px; font-family: 'Noto Sans KR', sans-serif; }
    .p-brand-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
    .p-brand-badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .p-brand-name { font-size: 10px; font-weight: 700; letter-spacing: .3px; }
    .p-name { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 5px; }
    .p-addr { font-size: 11.5px; color: #555; line-height: 1.55; margin-bottom: 4px; }
    .p-phone { font-size: 11px; color: #888; }
    .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 6px 20px rgba(0,0,0,.15) !important; padding: 14px 16px !important; }
    .leaflet-popup-content { margin: 0 !important; }

    /* ── Cluster ── */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-clip: padding-box; border-radius: 20px; }
    .marker-cluster-small { background: rgba(37,99,235,.18); }
    .marker-cluster-small div { background: rgba(37,99,235,.7); color:#fff; font-weight:700; }
    .marker-cluster-medium { background: rgba(217,119,6,.18); }
    .marker-cluster-medium div { background: rgba(217,119,6,.8); color:#fff; font-weight:700; }
    .marker-cluster-large { background: rgba(220,38,38,.18); }
    .marker-cluster-large div { background: rgba(220,38,38,.8); color:#fff; font-weight:700; }

    /* ── Loading ── */
    #loading { position: fixed; inset: 0; background: rgba(255,255,255,.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; }
    #loading.hidden { display: none; }
    .spinner { width: 42px; height: 42px; border: 3px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: var(--muted); }
    #loading b { color: var(--primary); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* Hide native iOS search cancel button (we have our own ✕) */
    #search-input::-webkit-search-cancel-button { display: none; }

    /* ── 0-data brands ── */
    .brand-btn.no-data { opacity: 0.38; pointer-events: none; }

    /* ── Active store left accent ── */
    .store-item.active { background: var(--primary-light); border-left: 3px solid var(--primary); }

    /* ── Loading progress bar ── */
    #load-bar-wrap {
      width: 200px; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden;
    }
    #load-bar { height: 100%; background: var(--primary); border-radius: 2px; width: 0%; transition: width .15s; }

    /* ══════════════════════════════════════════
       MOBILE  ≤ 767px  — Bottom Sheet Layout
    ══════════════════════════════════════════ */
    @media (max-width: 767px) {
      /* Header: compact */
      .header-sub { display: none; }
      #header { padding-left: 14px; padding-right: 14px; }

      /* Map fills full layout */
      #map {
        position: absolute; inset: 0;
        width: 100%; height: 100%; z-index: 1;
      }

      /* Sidebar → fixed bottom sheet */
      #sidebar {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        width: 100%; min-width: unset;
        border-right: none;
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 28px rgba(0,0,0,.12);
        z-index: 400;
        height: var(--sheet-h);
        transition: height .32s cubic-bezier(.4, 0, .2, 1);
        overflow: hidden;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      #sidebar.dragging { transition: none; }

      /* Show drag handle — compact on mobile */
      #sheet-handle { display: flex; padding: 6px 0 4px; }
      #sheet-handle::before { width: 32px; height: 3px; }

      /* Tab bar: hidden in peek, compact in half/full */
      #tab-bar { display: none; }
      .tab-btn { padding: 7px 8px; font-size: 12px; }
      #sidebar.half #tab-bar,
      #sidebar.full #tab-bar { display: flex; }

      /* Brand panel: always visible in peek as horizontal chip strip */
      #brand-panel { padding: 0 10px 4px; border-bottom: none; position: relative; }

      /* Hide 0-data chips on mobile entirely */
      .brand-btn.no-data { display: none !important; }

      /* Fade-out right edge of chip strip */
      #brand-panel::after {
        content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 32px;
        background: linear-gradient(to right, transparent, #fff);
        pointer-events: none; z-index: 1;
      }
      #brand-grid {
        display: flex !important; flex-direction: row;
        overflow-x: auto; overflow-y: hidden;
        max-height: none; padding: 0; gap: 6px;
        scrollbar-width: none; -webkit-overflow-scrolling: touch;
      }
      #brand-grid::-webkit-scrollbar { display: none; }

      /* Brand buttons → compact horizontal pill chips on mobile */
      .brand-btn {
        flex-direction: row; flex-shrink: 0;
        padding: 4px 9px; border-radius: 16px;
        height: 28px; gap: 4px; font-size: 11px;
        transform: none !important; box-shadow: none !important;
      }
      .brand-btn .b-icon { font-size: 12px; }
      .brand-btn .b-name { font-size: 11px; white-space: nowrap; overflow: visible; width: auto; padding: 0; }
      .brand-btn .b-cnt { font-size: 9px; }
      .brand-btn.active { box-shadow: 0 2px 8px rgba(0,0,0,.2) !important; }
      .all-btn { grid-column: auto; padding: 4px 9px; justify-content: center; }

      /* Region panel: hidden in peek (overflow:hidden clips it), shown in half/full */
      #sidebar.half #region-panel,
      #sidebar.full #region-panel { /* visibility controlled by switchTab JS */ }

      /* Search, list-header, store-list: hidden in peek, compact when visible */
      #search-panel { display: none; padding: 6px 10px; }
      #search-input { padding: 6px 10px 6px 30px; font-size: 12px; border-radius: 6px; }
      #list-header  { display: none; padding: 5px 10px; }
      #list-header span { font-size: 11px; }
      #store-list   { display: none; }

      #sidebar.half #search-panel,
      #sidebar.full #search-panel { display: block; }
      #sidebar.half #list-header,
      #sidebar.full #list-header  { display: flex; }
      #sidebar.half #store-list,
      #sidebar.full #store-list   { display: block; overflow-y: auto; }

      /* Compact store items — still meets 44px touch target */
      .store-item { padding: 9px 12px; min-height: 44px; gap: 8px; }
      .store-name { font-size: 13px; margin-bottom: 1px; }
      .store-brand-tag { font-size: 9px; padding: 0 4px; margin-bottom: 1px; }
      .store-addr { font-size: 11px; }
      .store-phone { font-size: 11px; margin-top: 1px; }
      .store-badge { width: 30px; height: 30px; font-size: 14px; }

      /* Location FAB floats above sheet */
      #my-location-btn {
        position: fixed; right: 16px; z-index: 390;
        bottom: calc(var(--sheet-h) + env(safe-area-inset-bottom, 0px) + 12px);
        width: auto; height: 40px; border-radius: 20px; border-radius: 20px;
        padding: 0 14px; gap: 6px; font-size: 16px;
        transition: bottom .32s cubic-bezier(.4, 0, .2, 1);
      }
      #my-location-btn .loc-label {
        display: inline; font-size: 13px; font-weight: 600; color: var(--text);
      }

      /* Leaflet zoom controls float above sheet */
      .leaflet-bottom.leaflet-right {
        bottom: calc(var(--sheet-h) + env(safe-area-inset-bottom, 0px) + 8px) !important;
        right: 8px !important;
        transition: bottom .32s cubic-bezier(.4, 0, .2, 1);
      }
      .leaflet-control-zoom a {
        width: 34px !important; height: 34px !important;
        line-height: 34px !important; font-size: 18px !important;
      }
    }

    @media (max-width: 380px) {
      .logo-text { font-size: 17px; }
      .header-stats { font-size: 11px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>가맹점 데이터 불러오는 중... <b id="load-progress">0 / 23</b></p>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
</div>

<header id="header">
  <div class="logo-wrap">
    <div class="logo-icon">🗺️</div>
    <div class="logo-text">프차<span>프차</span></div>
  </div>
  <div class="header-sub">전국 프랜차이즈 가맹점 지도</div>
  <div class="header-stats">총 <b id="total-count">0</b>개 가맹점</div>
</header>

<div id="layout">
  <aside id="sidebar">

    <!-- 드래그 핸들 (모바일 전용) -->
    <div id="sheet-handle"></div>

    <!-- 탭 바 -->
    <div id="tab-bar">
      <button class="tab-btn active" onclick="switchTab('brand')">🏪 브랜드</button>
      <button class="tab-btn" onclick="switchTab('region')">📍 지역</button>
    </div>

    <!-- 브랜드 패널 -->
    <div id="brand-panel">
      <div id="brand-grid"></div>
    </div>

    <!-- 지역 패널 -->
    <div id="region-panel" style="display:none">
      <div id="region-grid"></div>
    </div>

    <!-- 활성 필터 칩 -->
    <div id="filter-chips"></div>

    <!-- 검색 -->
    <div id="search-panel">
      <div id="search-wrap">
        <svg class="s-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="search" autocomplete="off" spellcheck="false" placeholder="가맹점명 또는 주소 검색...">
        <button id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <!-- 리스트 헤더 -->
    <div id="list-header">
      <div class="lh-count"><b id="list-count">0</b>개 가맹점</div>
      <div class="lh-sort" id="active-filter-label">전체</div>
    </div>

    <!-- 가맹점 목록 -->
    <div id="store-list"></div>
  </aside>

  <div id="map">
    <button id="my-location-btn" title="내 위치" onclick="goToMyLocation()">
      📍<span class="loc-label">내 위치</span>
    </button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const BRANDS = [
  { id:"isaac",      name:"이삭토스트",   color:"#ff8c00", icon:"🍞" },

const REGIONS = [
  { id:'서울', label:'서울', keywords:['서울특별시','서울'] },
  { id:'경기', label:'경기', keywords:['경기도','경기'] },
  { id:'인천', label:'인천', keywords:['인천광역시','인천'] },
  { id:'강원', label:'강원', keywords:['강원특별자치도','강원도','강원'] },
  { id:'충북', label:'충북', keywords:['충청북도','충북'] },
  { id:'충남', label:'충남', keywords:['충청남도','충남'] },
  { id:'대전', label:'대전', keywords:['대전광역시','대전'] },
  { id:'세종', label:'세종', keywords:['세종특별자치시','세종시','세종'] },
  { id:'전북', label:'전북', keywords:['전북특별자치도','전라북도','전북'] },

  { id:'부산', label:'부산', keywords:['부산광역시','부산'] },
  { id:'울산', label:'울산', keywords:['울산광역시','울산'] },
  { id:'제주', label:'제주', keywords:['제주특별자치도','제주도','제주'] },

function getRegionId(address) {
  if (!address) return null;
  for (const r of REGIONS) {
    for (const kw of r.keywords) {
      if (address.startsWith(kw)) return r.id;
    }
  }
  return null;
}

let allStores = [], filtered = [];
let clusterGroup = null;
let activeId = null;
let activeRegion = null;
let activeItem = null;
let currentTab = 'brand';

// ── 지도 초기화 ──────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([36.5, 127.8], 7);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

function makeIcon(color, emoji) {
  return L.divIcon({
    html: `<div style="
      width:28px;height:28px;border-radius:50% 50% 50% 0;
      background:${color};transform:rotate(-45deg);
      box-shadow:0 2px 6px rgba(0,0,0,.3);
      display:flex;align-items:center;justify-content:center;
    "><span style="transform:rotate(45deg);font-size:12px;line-height:28px;display:block;text-align:center">${emoji}</span></div>`,
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -30], className: ''
  });
}

// ── Popup 옵션 ───────────────────────────────────
function popupOpts() {
  const opts = { maxWidth: 260 };
  if (isMobile()) opts.autoPanPaddingBottomRight = L.point(10, 110);
  return opts;
}

// ── 마커 클러스터 빌드 ──────────────────────────
function buildMarkers(stores) {
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    spiderfyOnMaxZoom: true,
    chunkedLoading: true,
    iconCreateFunction(cluster) {
      const cnt = cluster.getChildCount();
      const size = cnt < 50 ? 'small' : cnt < 200 ? 'medium' : 'large';
      return L.divIcon({
        html: `<div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;background:${cnt<50?'rgba(37,99,235,.85)':cnt<200?'rgba(217,119,6,.85)':'rgba(220,38,38,.85)'};box-shadow:0 2px 8px rgba(0,0,0,.25);">${cnt.toLocaleString()}</div>`,
        className: 'marker-cluster marker-cluster-'+size,
        iconSize: [36, 36]
      });
    }
  });

  stores.forEach(s => {
    const brand = BRANDS.find(b => b.id === s.brandId);
    if (!brand) return;
    const marker = L.marker([s.lat, s.lng], { icon: makeIcon(brand.color, brand.icon) });
    marker.bindPopup(`
      <div class="store-popup">
        <div class="p-brand-row">
          <div class="p-brand-badge" style="background:${brand.color}20">${brand.icon}</div>
          <span class="p-brand-name" style="color:${brand.color}">${brand.name}</span>
        </div>
        <div class="p-name">${s.name}</div>
        <div class="p-addr">${s.address || ''}</div>
        ${s.phone ? `<div class="p-phone"><a href="tel:${s.phone.replace(/[^0-9+]/g,'')}" style="color:inherit;text-decoration:none">📞 ${s.phone}</a></div>` : ''}
      </div>`, popupOpts());
    marker._sid = s._id;
    clusterGroup.addLayer(marker);
  });
  map.addLayer(clusterGroup);
}

// ── 탭 전환 ─────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&tab==='brand')||(i===1&&tab==='region')));
  document.getElementById('brand-panel').style.display = tab === 'brand' ? '' : 'none';
  document.getElementById('region-panel').style.display = tab === 'region' ? '' : 'none';
}

// ── 브랜드 렌더 ─────────────────────────────────
function renderBrands() {
  const counts = {};
  allStores.forEach(s => { counts[s.brandId] = (counts[s.brandId]||0) + 1; });
  const grid = document.getElementById('brand-grid');
  grid.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'brand-btn all-btn' + (activeId===null?' active':'');
  allBtn.style.cssText = activeId===null ? 'background:var(--primary);border-color:var(--primary);color:#fff' : '';
  allBtn.innerHTML = `<span class="b-icon">🗺️</span><span class="b-name" style="font-size:12px">전체 브랜드</span><span class="b-cnt" style="margin-left:auto">${allStores.length.toLocaleString()}</span>`;
  allBtn.onclick = () => { activeId = null; applyAll(); };
  grid.appendChild(allBtn);

  BRANDS.forEach(b => {
    const cnt = counts[b.id] || 0;
    const btn = document.createElement('button');
    let cls = 'brand-btn';
    if (activeId===b.id) cls += ' active';
    if (cnt === 0) cls += ' no-data';
    btn.className = cls;
    if (activeId===b.id) btn.style.background = b.color;
    btn.innerHTML = `<span class="b-icon">${b.icon}</span><span class="b-name">${b.name}</span><span class="b-cnt">${cnt.toLocaleString()}</span>`;
    btn.onclick = () => {
      activeId = (activeId===b.id ? null : b.id);
      applyAll();
      if (isMobile() && getSheetState() === 'peek') setSheetState('half');
    };
    grid.appendChild(btn);
  });

  // Scroll active chip into view on mobile
  if (isMobile() && activeId) {
    requestAnimationFrame(() => {
      const active = grid.querySelector('.brand-btn.active');
      if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest' });
    });
  }
}

// ── 지역 렌더 ───────────────────────────────────
function renderRegions() {
  const counts = {};
  allStores.forEach(s => {
    const rid = getRegionId(s.address);
    if (rid) counts[rid] = (counts[rid]||0) + 1;
  });
  const grid = document.getElementById('region-grid');
  grid.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'region-btn all-region-btn' + (activeRegion===null?' active':'');
  allBtn.innerHTML = `<span>📍</span><span style="font-size:13px">전체 지역</span><span class="r-cnt" style="margin-left:auto">${allStores.length.toLocaleString()}</span>`;
  allBtn.onclick = () => { activeRegion = null; applyAll(); };
  grid.appendChild(allBtn);

  REGIONS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'region-btn' + (activeRegion===r.id?' active':'');
    btn.innerHTML = `<span>${r.label}</span><span class="r-cnt">${(counts[r.id]||0).toLocaleString()}</span>`;
    btn.onclick = () => {
      activeRegion = (activeRegion===r.id ? null : r.id);
      applyAll();
      if (isMobile() && getSheetState() === 'peek') setSheetState('half');
    };
    grid.appendChild(btn);
  });
}

// ── 필터 칩 ─────────────────────────────────────
function updateChips() {
  const container = document.getElementById('filter-chips');
  container.innerHTML = '';
  let visible = false;

  if (activeId) {
    const b = BRANDS.find(x => x.id===activeId);
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.style.cssText = `background:${b.color}18;color:${b.color};border:1.5px solid ${b.color}40`;
    chip.innerHTML = `${b.icon} ${b.name} <span class="chip-x">✕</span>`;
    chip.onclick = () => { activeId = null; applyAll(); };
    container.appendChild(chip);
    visible = true;
  }
  if (activeRegion) {
    const r = REGIONS.find(x => x.id===activeRegion);
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.style.cssText = 'background:#0f172a15;color:#0f172a;border:1.5px solid #0f172a30';
    chip.innerHTML = `📍 ${r.label} <span class="chip-x">✕</span>`;
    chip.onclick = () => { activeRegion = null; applyAll(); };
    container.appendChild(chip);
    visible = true;
  }
  container.classList.toggle('visible', visible);
}

// ── 검색 초기화 ─────────────────────────────────
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  applyAll();
}

// ── 통합 필터 ───────────────────────────────────
function applyAll() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();

  filtered = allStores.filter(s => {
    if (activeId && s.brandId !== activeId) return false;
    if (activeRegion && getRegionId(s.address) !== activeRegion) return false;
    if (q && !s.name.toLowerCase().includes(q) && !(s.address||'').toLowerCase().includes(q)) return false;
    return true;
  });

  buildMarkers(filtered);

  const parts = [];
  if (activeId) parts.push(BRANDS.find(b=>b.id===activeId)?.name);
  if (activeRegion) parts.push(REGIONS.find(r=>r.id===activeRegion)?.label);
  document.getElementById('active-filter-label').textContent = parts.length ? parts.join(' · ') : '전체';

  updateChips();
  renderBrands();
  renderRegions();
  renderList();
}

// ── 목록 렌더 ────────────────────────────────────
function renderList() {
  const el = document.getElementById('store-list');
  document.getElementById('list-count').textContent = filtered.length.toLocaleString();
  el.scrollTop = 0;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-msg"><span class="big">🔍</span><span>검색 결과가 없습니다</span></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.slice(0, 300).forEach(s => {
    const b = BRANDS.find(x => x.id===s.brandId);
    const div = document.createElement('div');
    div.className = 'store-item';
    div.innerHTML = `
      <div class="store-badge" style="background:${b.color}18">${b.icon}</div>
      <div class="store-info">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
          <span class="store-name">${s.name}</span>
        </div>
        <div style="margin-bottom:2px"><span class="store-brand-tag" style="background:${b.color}15;color:${b.color}">${b.name}</span></div>
        <div class="store-addr">${s.address || '주소 미제공'}</div>
        ${s.phone ? `<div class="store-phone">📞 ${s.phone}</div>` : ''}
      </div>`;
    div.onclick = () => focusStore(s, div);
    frag.appendChild(div);
  });

  if (filtered.length > 300) {
    const more = document.createElement('div');
    more.className = 'empty-msg'; more.style.height = '64px';
    more.innerHTML = `<span style="font-size:12px;color:var(--muted)">+ ${(filtered.length-300).toLocaleString()}개 더 있습니다<br>검색어로 좁혀주세요</span>`;
    frag.appendChild(more);
  }
  el.innerHTML = '';
  el.appendChild(frag);
}

// ── 가맹점 포커스 ────────────────────────────────
function openPopupForStore(sid) {
  if (!clusterGroup) return;
  const layer = [...clusterGroup.getLayers()].find(m => m._sid === sid);
  if (!layer) return;
  clusterGroup.zoomToShowLayer(layer, () => {
    layer.openPopup();
  });
}

function focusStore(s, el) {
  if (activeItem) activeItem.classList.remove('active');
  el.classList.add('active'); activeItem = el;

  if (isMobile()) {
    setSheetState('peek');
    setTimeout(() => openPopupForStore(s._id), 80);
  } else {
    map.setView([s.lat, s.lng], 16, { animate: true });
    setTimeout(() => openPopupForStore(s._id), 350);
  }
}

// ── 내 위치 ─────────────────────────────────────
function goToMyLocation() {
  if (!navigator.geolocation) { alert('이 브라우저는 위치 서비스를 지원하지 않습니다.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 14, { animate: true });
      if (isMobile()) setSheetState('peek');
    },
    () => {},
    { timeout: 8000, maximumAge: 60000 }
  );
}

// ── 모바일 Bottom Sheet ──────────────────────────
const sidebar = document.getElementById('sidebar');

function isMobile() { return window.innerWidth < 768; }

function getSheetState() {
  if (sidebar.classList.contains('full')) return 'full';
  if (sidebar.classList.contains('half')) return 'half';
  return 'peek';
}

function setSheetState(state) {
  const vh = window.innerHeight;
  const px = { peek: 76, half: Math.round(vh * 0.60), full: vh - 66 }[state];
  sidebar.classList.remove('half', 'full');
  if (state === 'half') sidebar.classList.add('half');
  if (state === 'full') sidebar.classList.add('full');
  // Set on :root so CSS calc() in btn-locate & leaflet controls picks it up
  document.documentElement.style.setProperty('--sheet-h', px + 'px');

  // In peek: always show brand panel (chip strip), hide region panel
  // In half/full: restore whichever tab was active
  const brandPanel  = document.getElementById('brand-panel');
  const regionPanel = document.getElementById('region-panel');
  if (state === 'peek') {
    brandPanel.style.display  = '';
    regionPanel.style.display = 'none';
  } else {
    brandPanel.style.display  = currentTab === 'brand'  ? '' : 'none';
    regionPanel.style.display = currentTab === 'region' ? '' : 'none';
  }

  setTimeout(() => map.invalidateSize(), 340);
}

// Tap handle to cycle: peek → half → full → peek
document.getElementById('sheet-handle').addEventListener('click', () => {
  if (!isMobile()) return;
  setSheetState({ peek: 'half', half: 'full', full: 'peek' }[getSheetState()]);
});

// Touch drag
(function () {
  const handle = document.getElementById('sheet-handle');
  let dragging = false, startY = 0, startH = 0;

  handle.addEventListener('touchstart', e => {
    if (!isMobile()) return;
    dragging = true;
    startY = e.touches[0].clientY;
    startH = sidebar.getBoundingClientRect().height;
    sidebar.classList.add('dragging');
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = startY - e.touches[0].clientY;
    const minH = 60, maxH = window.innerHeight - 60;
    const newH = Math.max(minH, Math.min(maxH, startH + dy));
    document.documentElement.style.setProperty('--sheet-h', newH + 'px');
  }, { passive: true });

  function snapToState() {
    if (!dragging) return;
    dragging = false;
    sidebar.classList.remove('dragging');
    const h = sidebar.getBoundingClientRect().height;
    const vh = window.innerHeight;
    if      (h < vh * 0.26) setSheetState('peek');
    else if (h < vh * 0.72) setSheetState('half');
    else                     setSheetState('full');
  }

  window.addEventListener('touchend',    snapToState);
  window.addEventListener('touchcancel', snapToState);
})();

// Tap map → collapse sheet to peek
map.on('click', () => {
  if (isMobile() && getSheetState() !== 'peek') setSheetState('peek');
});

// ── 검색 이벤트 ──────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  document.getElementById('search-clear').classList.toggle('visible', this.value.length > 0);
  applyAll();
});
document.getElementById('search-input').addEventListener('focus', () => {
  if (isMobile() && getSheetState() === 'peek') setSheetState('half');
});

// ── 창 크기 변경 ─────────────────────────────────
window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.documentElement.style.removeProperty('--sheet-h');
    sidebar.classList.remove('half', 'full', 'dragging');
  } else {
    setSheetState(getSheetState());
  }
  map.invalidateSize();
});

// ── 데이터 로드 ──────────────────────────────────
async function loadData() {
  let idx = 0;
  const total = BRANDS.length;
  let done = 0;
  const progressEl = document.getElementById('load-progress');
  const barEl = document.getElementById('load-bar');

  const results = await Promise.allSettled(
    BRANDS.map(b =>
      fetch(`data/${b.id}.json`)
        .then(r => r.ok ? r.json() : [])
        .then(list => {
          done++;
          if (progressEl) progressEl.textContent = `${done} / ${total}`;
          if (barEl) barEl.style.width = Math.round(done / total * 100) + '%';
          return { brand: b, list };
        })
    )
  );
  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    const { brand, list } = r.value;
    list.forEach(s => {
      if (!s.lat || !s.lng) return;
      allStores.push({ ...s, _id: idx++, brandId: brand.id, brandName: brand.name, brandColor: brand.color });
    });
  });

  document.getElementById('total-count').textContent = allStores.length.toLocaleString();
  filtered = [...allStores];
  buildMarkers(allStores);
  renderBrands();
  renderRegions();
  renderList();
  document.getElementById('loading').classList.add('hidden');
  if (isMobile()) setSheetState('peek');
}

loadData();
</script>
